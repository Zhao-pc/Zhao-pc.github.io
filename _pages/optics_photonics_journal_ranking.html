function doFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = journals.filter(([rank, name, issn, eissn, zone, url]) => {
    const zoneOk = activeZone === 'all' || zone == activeZone;
    const nameOk = !q || name.toLowerCase().includes(q) || issn.includes(q) || eissn.includes(q);
    return zoneOk && nameOk;
  });
  render(filtered);
}

    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = data.map(([rank, name, issn, eissn, zone, url]) => `
      <tr>
        <td class="rank">${rank}</td>
        <td class="name-cell">
          <a class="journal-link" href="${url}" target="_blank" rel="noopener">
            ${name}
            <svg class="ext-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/>
              <path d="M8 1h3v3M11 1 6 6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </td>
        <td class="issn-cell">${issn}</td>
        <td class="issn-cell">${eissn}</td>
        <td><span class="zone-badge badge-${zone}">${zone}区</span></td>
      </tr>`).join('');
  }
  label.textContent = `${data.length} 本期刊`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeZone = btn.dataset.zone;
    doFilter();
  });
});

render(journals);
</script>
</body>
</html>
