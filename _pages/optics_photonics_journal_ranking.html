let activeZone = 'all';

function ifStr(rank) {
  const v = IF_MAP[rank];
  if (v === null || v === undefined) return '<span class="if-none">—</span>';

  if (typeof v === 'string') {
    return '<span class="if-low">' + v + '</span>';
  }

  let cls = v >= 10 ? 'if-high' : v >= 4 ? 'if-mid' : 'if-low';
  return '<span class="' + cls + '">' + v.toFixed(1) + '</span>';
}

function doFilter() {
  const q = document.getElementById('search').value.trim().toLowerCase();
  const filtered = journals.filter(([rank, name, issn, eissn, zone, url]) => {
    const zoneOk = activeZone === 'all' || zone == activeZone;
    const cleanName = name.replace(/&amp;/g, '&').toLowerCase();
    const nameOk = !q || cleanName.includes(q) || issn.toLowerCase().includes(q) || eissn.toLowerCase().includes(q);
    return zoneOk && nameOk;
  });
  render(filtered);
}

function render(data) {
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('empty');
  const label = document.getElementById('count-label');

  if (data.length === 0) {
    tbody.innerHTML = '';
    empty.style.display = 'block';
  } else {
    empty.style.display = 'none';
    tbody.innerHTML = data.map(([rank, name, issn, eissn, zone, url]) => `
      <tr>
        <td class="rank">${rank}</td>
        <td class="name-cell">
          <a class="journal-link" href="${url}" target="_blank" rel="noopener">
            ${name}
            <svg class="ext-icon" viewBox="0 0 12 12" fill="none" stroke="currentColor" stroke-width="1.5">
              <path d="M5 2H2a1 1 0 0 0-1 1v7a1 1 0 0 0 1 1h7a1 1 0 0 0 1-1V7"/>
              <path d="M8 1h3v3M11 1 6 6" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </a>
        </td>
        <td class="if-cell">${ifStr(rank)}</td>
        <td class="issn-cell">${issn}</td>
        <td class="issn-cell">${eissn}</td>
        <td><span class="zone-badge badge-${zone}">Q${zone}</span></td>
      </tr>`).join('');
  }

  label.textContent = `${data.length} 本期刊`;
}

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    activeZone = btn.dataset.zone;
    doFilter();
  });
});

render(journals);
