let currentZone = 'all';

function renderTable(data) {
  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  data.forEach(([rank, name, issn, eissn, zone]) => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td class="rank">${rank}</td>
      <td class="journal-name">${name}</td>
      <td class="issn-cell">${issn}</td>
      <td class="issn-cell">${eissn}</td>
      <td><span class="zone-badge z${zone}">${zone}区</span></td>
    `;
    tbody.appendChild(tr);
  });
}

function filterZone(zone, btn) {
  currentZone = zone;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  const filtered = zone === 'all' ? journals : journals.filter(j => j[4] == zone);
  renderTable(filtered);
}
