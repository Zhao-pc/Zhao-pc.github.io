<!-- Language Toggle Button -->
<button id="lang-toggle" 
  aria-label="Switch language / 切换语言"
  style="
    cursor: pointer;
    background: transparent;
    border: 1.5px solid #888;
    border-radius: 20px;
    padding: 4px 12px;
    font-size: 13px;
    color: inherit;
    margin-left: 12px;
    transition: all 0.2s ease;
    vertical-align: middle;
    white-space: nowrap;
  "
  onmouseover="this.style.borderColor='#333';this.style.background='rgba(0,0,0,0.06)'"
  onmouseout="this.style.borderColor='#888';this.style.background='transparent'"
  onclick="toggleLang()"
>
  中文
</button>
